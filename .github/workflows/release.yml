name: Release PingMod

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Generate build tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          echo "BUILD_TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Build Client Release
        run: |
          msbuild "StarRupture-PingMod.sln" `
            /p:Configuration="Client Release" `
            /p:Platform=x64 `
            /p:ModLoaderBuildTag="${{ steps.tag.outputs.BUILD_TAG }}" `
            /m `
            /v:minimal

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item "bin\x64\Client Release\plugins\PingMod.dll" -Destination "release\PingMod.dll"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PingMod ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            release/PingMod.dll
